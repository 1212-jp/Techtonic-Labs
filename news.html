<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>News - Techtonic Labs</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f4f4f4;
}
header{
    background:#222;
    color:white;
    padding:15px;
}
.logo{
    display:flex;
    align-items:center;
    gap:10px;
}
.logo img{
    width:50px;
}
nav a{
    color:white;
    margin-right:15px;
    text-decoration:none;
}
section{
    padding:20px;
}
.card{
    background:white;
    padding:20px;
    margin:15px 0;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
select{
    padding:10px;
    margin:10px;
}
a{
    color:blue;
}
</style>
</head>

<body>

<div role="status" aria-live="polite">
This website is under working.
</div>

<header>
<div class="logo">
<img src="images/logo.png" alt="Techtonic Labs Logo">
<h1>Techtonic Labs</h1>
</div>

<nav>
<a href="index.html">Home</a>
<a href="news.html">News</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section>
<h2>Latest News</h2>

<label for="cat">Category:</label>
<select id="cat">
<option value="technology">Technology</option>
<option value="business">Business</option>
<option value="sports">Sports</option>
<option value="health">Health</option>
<option value="science">Science</option>
<option value="entertainment">Entertainment</option>
</select>

<label for="lang">Language:</label>
<select id="lang">
<option value="en">English</option>
<option value="hi">Hindi</option>
</select>

<div id="news">Choose a category to load news.</div>
</section>

<script>
const API_URL='https://backand-782w.onrender.com/news';

async function translateText(text,target){
    if(!text || target==='en') return text;

    try{
        const url=
        'https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl='
        + target +
        '&dt=t&q=' +
        encodeURIComponent(text);

        const response=await fetch(url);
        const data=await response.json();

        if(data && data[0]){
            return data[0].map(item=>item[0]).join('');
        }

        return text;
    }catch(error){
        console.log("Translation failed:", error);
        return text;
    }
}

async function loadNews(){
    const category=document.getElementById('cat').value;
    const lang=document.getElementById('lang').value;
    const box=document.getElementById('news');

    box.innerHTML='Loading news...';

    try{
        const response=await fetch(API_URL);
        const data=await response.json();

        let items=(data.results || [])
            .filter(news =>
                !category ||
                (news.category || []).includes(category)
            )
            .slice(0,10);

        let html='';

        for(let article of items){

            let title=article.title || '';
            let desc=article.description || '';

            if(lang==='hi'){
                title=await translateText(title,'hi');
                desc=await translateText(desc,'hi');
            }

            html += `
            <div class="card">
                <h3>${title}</h3>
                <p>${desc}</p>
                <a href="${article.link || '#'}" target="_blank">
                    ${lang==='hi' ? 'पूरा समाचार पढ़ें' : 'Read Full Article'}
                </a>
            </div>
            `;
        }

        box.innerHTML=html || 'No news available.';
    }
    catch(error){
        console.error(error);
        box.innerHTML='Unable to load news.';
    }
}

document.addEventListener('DOMContentLoaded',()=>{
    document.getElementById('cat').addEventListener('change',loadNews);
    document.getElementById('lang').addEventListener('change',loadNews);
    loadNews();
});
</script>

<footer style="padding:20px;">
<a href="privacy.html">Privacy Policy</a>
</footer>

</body>
</html>
