<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Password Generator</title><link rel="stylesheet" href="css/style.css"></head><body>
<header><h1>Password Generator</h1></header>
<section id="introSection">
<h2>What Does This Tool Do?</h2>
<p>The Password Generator Tool helps you create strong and secure passwords instantly for online accounts and services.</p>
<button id="startTool">Start Tool</button>
</section>
<section id="toolSection" style="display:none;">
<h2>Your Generated Password</h2>
<input type="text" id="passwordOutput" readonly aria-label="Generated Password">
<button id="copyPassword">Copy Password</button>
<button id="generateAgain">Generate New Password</button>
<div id="statusMessage" aria-live="polite" style="position:absolute;left:-9999px;"></div>
</section>
<script>
function generatePassword(length=16){const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}";let p="";for(let i=0;i<length;i++){p+=chars.charAt(Math.floor(Math.random()*chars.length));}return p;}
document.getElementById("startTool").onclick=function(){introSection.style.display='none';toolSection.style.display='block';passwordOutput.value=generatePassword();}
generateAgain.onclick=function(){passwordOutput.value=generatePassword();}
copyPassword.onclick=function(){navigator.clipboard.writeText(passwordOutput.value);statusMessage.textContent='Password copied to clipboard.';}
</script></body></html>
