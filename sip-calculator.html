<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIP Calculator</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f0f2f5;
}

.container{
    max-width:800px;
    margin:auto;
    padding:20px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    font-size:16px;
    box-sizing:border-box;
}

button{
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
    margin:5px;
    border:none;
    border-radius:6px;
    background:#007bff;
    color:white;
}

button:disabled{
    opacity:.5;
    cursor:not-allowed;
}

#result{
    margin-top:20px;
    padding:15px;
    border-radius:8px;
    background:#f5f5f5;
    filter:none !important;
    backdrop-filter:none !important;
    opacity:1 !important;
    color:#000;
    font-weight:500;
}

ul{
    line-height:1.8;
}
</style>
</head>
<body>

<div class="container">

<section id="intro" class="card">
<h1>📈 SIP Calculator</h1>
<p>SIP calculator helps estimate future value of monthly investments.</p>

<button id="startBtn">Start SIP Calculator</button>
</section>

<section id="tool" class="card" style="display:none;">
<h2>SIP Calculator</h2>

<input id="m" type="number" min="1" placeholder="Monthly Investment (₹)">
<input id="r" type="number" min="0" step="0.1" placeholder="Expected Annual Return (%)">
<input id="y" type="number" min="1" placeholder="Investment Duration (Years)">

<button id="calcBtn" disabled>Calculate SIP</button>
<button id="pdfBtn">Download PDF</button>

<div id="result"></div>
</section>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const startBtn=document.getElementById("startBtn");
const tool=document.getElementById("tool");
const intro=document.getElementById("intro");

const m=document.getElementById("m");
const r=document.getElementById("r");
const y=document.getElementById("y");

const calcBtn=document.getElementById("calcBtn");
const result=document.getElementById("result");
const pdfBtn=document.getElementById("pdfBtn");

startBtn.addEventListener("click",()=>{
    intro.style.display="none";
    tool.style.display="block";
});

function validateForm(){
    const valid=
        m.value!=="" &&
        r.value!=="" &&
        y.value!=="" &&
        Number(m.value)>0 &&
        Number(r.value)>=0 &&
        Number(y.value)>0;

    calcBtn.disabled=!valid;
}

[m,r,y].forEach(field=>{
    field.addEventListener("input",validateForm);
});

function calculate(){
    let P=Number(m.value);
    let R=Number(r.value)/1200;
    let n=Number(y.value)*12;

    let fv;

    if(R===0){
        fv=P*n;
    }else{
        fv=P*(((Math.pow(1+R,n)-1)/R)*(1+R));
    }

    let invested=P*n;
    let returns=fv-invested;

    result.innerHTML=`
    <h2>Investment Results</h2>
    <p><strong>Monthly Investment:</strong> ₹${P.toLocaleString()}</p>
    <p><strong>Expected Return:</strong> ${r.value}%</p>
    <p><strong>Investment Duration:</strong> ${y.value} Years</p>
    <hr>
    <p><strong>Total Invested:</strong> ₹${invested.toFixed(2)}</p>
    <p><strong>Estimated Returns:</strong> ₹${returns.toFixed(2)}</p>
    <p><strong>Maturity Value:</strong> ₹${fv.toFixed(2)}</p>
    `;
}

calcBtn.addEventListener("click",calculate);

pdfBtn.addEventListener("click",()=>{
    if(result.innerHTML===""){
        alert("पहले calculation करें");
        return;
    }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(18);
    doc.text("SIP Calculator Result", 20, 20);

    let lines=result.innerText.split("\n");
    let yPos=40;

    lines.forEach(line=>{
        if(line.trim()!==""){
            doc.text(line.trim(),20,yPos);
            yPos+=10;
        }
    });

    doc.save("sip-result.pdf");
});
</script>

</body>
</html>
